name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Fetch mathlib cache
        run: lake exe cache get
      - name: Run code-only verification
        run: scripts/verify.sh all
